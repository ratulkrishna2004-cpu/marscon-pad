<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARSCON 2026 - Digital Pad Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toolbar">
        <div class="header-title">MARSCON 2026 DIGITAL PAD</div>
        <div class="button-group">
            <button class="btn add-btn" onclick="addText()">+ Add Text Box</button>
            
            <div class="input-group">
                <label>Size:</label>
                <input type="number" id="fontSize" value="22" min="10" max="100">
            </div>

            <button class="btn delete-btn" onclick="deleteSelected()">Delete Selected</button>
            <button class="btn download-btn" onclick="downloadPDF()">Download HD PDF</button>
        </div>
        <div class="instruction">Double click on text to edit. Drag to move. Press 'Delete' key to remove.</div>
    </div>

    <div class="canvas-container-wrapper">
        <canvas id="padCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
